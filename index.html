        class Bullet {
            constructor(x, y, angle, speed, color, radius = 4, damage = 1.8, isHoming = false) {
                this.x = x; this.y = y; this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.color = color; this.radius = radius; this.damage = damage; this.isHoming = isHoming;
            }
            update() {
                if (this.isHoming) {
                    let angleToBoss = Math.atan2(boss.y - this.y, boss.x - this.x);
                    this.vx += Math.cos(angleToBoss) * 0.5;
                    this.vy += Math.sin(angleToBoss) * 0.5;
                    let speed = Math.hypot(this.vx, this.vy);
                    if (speed > 8) { this.vx *= 8/speed; this.vy *= 8/speed; }
                }
                this.x += this.vx; this.y += this.vy;

            }

            draw() {

if (currentPlayer === "sakuya" && this.isHoming) {

    ctx.save();

    let angle = Math.atan2(this.vy, this.vx);
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);

    // 🔷 thân dao (xanh biển)
    ctx.fillStyle = "#3399ff";
    ctx.fillRect(-14, -2, 24, 4);

    // 🔷 đầu dao (dài + nhọn hơn)
    ctx.beginPath();
    ctx.moveTo(10, -4);
    ctx.lineTo(18, 0);
    ctx.lineTo(10, 4);
    ctx.closePath();
    ctx.fill();

    // ✝️ thanh dọc (thập giá ngược)

    ctx.fillRect(-14, -1, 24, 2);

    // 🌟 glow xanh nhẹ

    ctx.lineWidth = 1;
    ctx.strokeRect(-14, -2, 24, 4);

    ctx.restore();

    return;
}

                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                if (this.isHoming) { // Hiệu ứng hào quang cho Orb của Reimu
                    ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
                }
            }
        }

class Arrow {
    constructor(x, y, angle) {
        this.x = x;
        this.y = y;
        this.angle = angle;

        this.vx = Math.cos(angle) * 2;
        this.vy = Math.sin(angle) * 2;

        this.timer = 0;
        this.state = "move"; // move → stop → explode
    }

    update() {
        this.timer++;

        if (this.state === "move") {
            this.x += this.vx;
            this.y += this.vy;

            if (this.timer > 30) {
                this.state = "stop";
                this.vx = 0;
                this.vy = 0;
            }
        } 
        else if (this.state === "stop") {
            if (this.timer > 70) {
                this.explode();
                this.dead = true;
            }
        }
    }

    explode() {
        // 💥 nổ thành vòng đạn nhỏ
        for (let i = 0; i < 12; i++) {
            enemyBullets.push(new Bullet(
                this.x,
                this.y,
                i * Math.PI * 2 / 12,
                2.5,
                "#ffaa00",
                3
            ));
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        // 🏹 thân mũi tên
        ctx.fillStyle = "#ffaa00";
        ctx.fillRect(-10, -2, 20, 4);

        // đầu nhọn
        ctx.beginPath();
        ctx.moveTo(10, 0);
        ctx.lineTo(16, -4);
        ctx.lineTo(16, 4);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
    }
}

        class Laser {
    constructor() {
        this.reset();
    }

    reset() {
        this.timer = 0;

        // 🎲 random hướng
        this.side = Math.random() < 0.5 ? "left" : "right";

        this.currentX = (this.side === "left") ? -300 : canvas.width + 300;
        this.speed = (this.side === "left") ? 5 : -5;

        this.targetY = player.y;
        this.active = true;
        this.firing = false;
    }

    update() {
        this.timer++;

        // lock vị trí player lúc bắt đầu
        if (this.timer === 1) {
            this.targetY = player.y;
        }

        // bắt đầu bắn ngay
        if (this.timer > 10) {
            this.firing = true;
        }

        // 🚀 bay thẳng luôn (mượt hơn lerp)
        this.currentX += this.speed;

        // ra khỏi màn → reset
        if (
            this.currentX < -400 ||
            this.currentX > canvas.width + 400
        ) {
            this.reset();
        }
    }

    draw() {
        if (!this.active) return;

        let length = canvas.width;
        let thickness = 18;

        ctx.save();
        ctx.translate(this.currentX, this.targetY);

        // glow
        ctx.fillStyle = "rgba(255,200,0,0.15)";
        ctx.fillRect(-length/2, -thickness, length, thickness*2);

        // laser chính
        ctx.fillStyle = this.firing ? "#ff4444" : "#ffaa00";
        ctx.fillRect(-length/2, -thickness/2, length, thickness);

        // lõi trắng
        ctx.fillStyle = "white";
        ctx.fillRect(-length/2, -3, length, 6);

        ctx.restore();
    }
}

    let touchX = e.touches[0].clientX;
    let touchY = e.touches[0].clientY;

    let dx = touchX - lastTouchX;
    let dy = touchY - lastTouchY;

    // 🎮 di chuyển kiểu swipe
    player.x += dx;
    player.y += dy;

    // cập nhật touch cuối
    lastTouchX = touchX;
    lastTouchY = touchY;

    // giới hạn màn hình

    player.y = Math.max(10, Math.min(canvas.height - 10, player.y));

window.addEventListener("touchend", () => {

if (currentPlayer === "sakuya") {

                if (navigator.vibrate) navigator.vibrate(200);

let lastCycle = -1;
let phaseStartFrame = 0; // ⏱️ Biến nhớ lưu frame bắt đầu của phase hiện tại

function spawnDanmaku() {

    if (timeStop > 0) return;

    frame++; 
    let cycle = frame % 1600;

    // Xác định id của phase hiện tại dựa trên cycle
    let currentPhaseId = 1;
    if (cycle >= 400 && cycle < 800) currentPhaseId = 2;
    else if (cycle >= 800) currentPhaseId = 3;

    // Xác định id của phase ở frame trước đó
    let lastPhaseId = 1;
    if (lastCycle >= 400 && lastCycle < 800) lastPhaseId = 2;
    else if (lastCycle >= 800) lastPhaseId = 3;

    // 🔄 TỰ ĐỘNG RESET TIME XOÁY KHI CHUYỂN PHASE (Bao gồm cả khi cycle lặp lại từ 1199 về 0)
    if (currentPhaseId !== lastPhaseId || lastCycle === -1) {
        phaseStartFrame = frame;
    }

    // vào phase laser
    if (cycle >= 800 && lastCycle < 400) {
        lasers.forEach(l => l.reset());
    }

    lastCycle = cycle;

    if (timeStop <= 0) {
        boss.x = (canvas.width/2) + Math.sin(frame * 0.01) * (canvas.width/4);
    }
    if (bombTimer > 0) { enemyBullets = []; return; } // Clear bullets during bomb

if (cycle < 400) {

    if (frame % 55 === 0) {
        for (let i = 0; i < 22; i++) {
            enemyBullets.push(new Bullet(
                boss.x,
                boss.y,
                (i * Math.PI * 2 / 22),
                6,
                "#bb66ff",
                20
            ));
        }
}
    if (frame % 50 === 0) {

        for (let stream = 0; stream < 8; stream++) {

            let baseAngle = stream * Math.PI * 2 / 8;

            for (let i = 0; i < 20; i++) {

                let b = new Bullet(
                    boss.x,
                    boss.y,
                    baseAngle,
                    0,
                    "yellow",
                    5
                );

                b.age = -i * 2;

                b.update = function () {

                    this.age++;

                    if (this.age < 0) return;

                    // Bay thẳng
                    if (this.age < 15) {

                        this.x += Math.cos(baseAngle) * 4;
                        this.y += Math.sin(baseAngle) * 4;

                    }

                    // Uốn ngược
                    else if (this.age < 35) {

                        let a = baseAngle - (this.age - 15) * 0.08;

                        this.x += Math.cos(a) * 4;
                        this.y += Math.sin(a) * 4;

                    }

                    // Xoay 1 vòng nhỏ
                    else if (this.age < 75) {

                        let t = this.age - 35;

                        let cx = this.x;
                        let cy = this.y;

                        this.x = cx + Math.cos(t * 0.18) * 3;
                        this.y = cy + Math.sin(t * 0.18) * 3;

                    }

                    // Bay tiếp
                    else {

                        let a = baseAngle - 20 * 0.08;

                        this.x += Math.cos(a) * 5;
                        this.y += Math.sin(a) * 5;

                    }

                };

                enemyBullets.push(b);

            }

        }

    }

} else if (cycle < 800) {

    if (timeStop <= 0) {
        lasers.forEach(l => l.update());
    }

    if (frame % 50 === 0) {

    for (let i = 0; i < 30; i++) {

        let angle = i * Math.PI * 2 / 30;

            for (let i = 0; i < 10; i++) {

                // tạo hiệu ứng nối đuôi

                    this.y += Math.sin(angle) * 5;

            }

        }

    }

}

else if (cycle < 1200) {

    if (frame % 65 === 0) {
        for (let i = 0; i < 22; i++) {
            enemyBullets.push(new Bullet(
                boss.x,
                boss.y,
                (i * Math.PI * 2 / 22),
                6,
                "#bb66ff",
                20
            ));
        }
}

if (frame % 60 === 0) {

    for (let side = -1; side <= 1; side += 2) {

        for (let k = 0; k < 10; k++) {

            let ang = (side == -1)
                ? -Math.PI * 0.75 + k * 0.06
                : -Math.PI * 0.25 - k * 0.06;

            for (let i = 0; i < 10; i++) {

                let b = new Bullet(boss.x, boss.y, ang, 5, "yellow", 5);

                b.age = -i * 2;
                b.turn = false;
                b.spawned = false;

                // -1 -> 1 để khi rơi xuống đạn toả cả vào trong lẫn ra ngoài
                b.offset = (k - 4.5) / 4.5;

                b.update = function () {

                    this.age++;
                    if (this.age < 0) return;

                    if (!this.turn) {

                        this.x += Math.cos(ang) * 5;
                        this.y += Math.sin(ang) * 5;

                        if (this.age >= 30) {

                            this.turn = true;

                            if (!this.spawned) {

                                this.spawned = true;

                                // Shou bắn thêm 20 hướng lên trên
                                for (let t = 0; t < 10; t++) {

                                    let a = -Math.PI + t * Math.PI / 9;

                                    for (let j = 0; j < 5; j++) {

                                        let bb = new Bullet(
                                            boss.x,
                                            boss.y,
                                            a,
                                            5,
                                            "yellow",
                                            5
                                        );

                                        bb.age = -j * 2;

                                        bb.update = function () {

                                            this.age++;
                                            if (this.age < 0) return;

                                            this.x += Math.cos(a) * 5;
                                            this.y += Math.sin(a) * 5;

                                        };

                                        enemyBullets.push(bb);

                                    }

                                }

                            }

                        }

                    } else {

                        // Rơi xuống và toả rất rộng
                        this.x += this.offset * 8;
                        this.y += 5;

                    }

                };

                enemyBullets.push(b);

            }

        }

    }

}

}

else if (cycle < 1600) {

    // 6 cột đạn rơi từ mép trên
    if (frame % 10 === 0) {

let x = 0 + Math.random() * (canvas.width - 0);

}

                ctx.fillStyle = "rgba(255,255,100,0.3)"; ctx.fillRect(player.x - sparkW, 0, sparkW*2, player.y);
            }

if (typeof imgShou !== 'undefined') {
    ctx.drawImage(imgShou, boss.x - 60, boss.y - 60, 120, 120);
}

let img = (currentPlayer === "reimu") ? imgReimu :
          (currentPlayer === "marisa") ? imgMarisa :
          imgSakuya;

if (img && img.complete) {
    ctx.drawImage(img, player.x - 20, player.y - 20, 40, 40);
} else {
    // fallback nếu ảnh chưa load
    ctx.fillStyle = (currentPlayer === "reimu") ? "#44aaff" : "#ffff00";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.visualR, 0, Math.PI * 2);
    ctx.fill();
}

                // Tâm né đạn (Hitbox)
                ctx.fillStyle = "lime"; 
                ctx.beginPath(); 
                ctx.arc(player.x, player.y, 3, 0, Math.PI*2);
                ctx.fill();

arrows.forEach(a => a.draw());

            enemyBullets.forEach(b => b.draw());
            playerBullets.forEach(b => b.draw());
            bombEffects.forEach(orb => orb.draw());

            
            
            ctx.restore(); 
            update(); 
            requestAnimationFrame(draw);
        }
    </script>
</body>
